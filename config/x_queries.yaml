queries:
  # claude-code（日本語）- ノウハウ・設定方法に絞る
  - query: "Claude Code CLAUDE.md 書き方 OR コンテキスト管理 OR Handover"
    category: "claude-code"
    lang: "ja"

  # claude-code（英語）- 実践的なtipsに絞る
  - query: "\"Claude Code\" workflow OR CLAUDE.md setup OR \"Claude context\""
    category: "claude-code"
    lang: "en"

  # cowork - 具体的な活用法に絞る
  - query: "Cowork スケジュール OR Cowork スキル作成 OR Cowork 自動化"
    category: "cowork"
    lang: "ja"

  # ai-workflow（日本語）- 設定手順・活用事例に絞る
  - query: "MCP server 設定 OR MCP 活用事例 OR MCP 連携"
    category: "ai-workflow"
    lang: "ja"

  # ai-workflow（英語）- セットアップ・実例に絞る
  - query: "\"Model Context Protocol\" tutorial OR \"Claude MCP\" integration"
    category: "ai-workflow"
    lang: "en"

  # claude-code 新機能 - 使い方に絞る
  - query: "Claude Code hooks 使い方 OR subagents 設定 OR Claude Code スケジュール"
    category: "claude-code"
    lang: "ja"

  # プロンプト技法・AI活用の実践（新規追加）
  - query: "Claude プロンプト 書き方 OR Claude 業務効率化 実例"
    category: "ai-workflow"
    lang: "ja"

  # 建設系（日本語）- 具体的な活用に絞る
  - query: "AI 施工管理 OR AI 建設 業務効率化 OR ICT施工"
    category: "construction"
    lang: "ja"

  # 建設系（英語）
  - query: "\"AI construction\" site management OR \"AI civil engineering\" project"
    category: "construction"
    lang: "en"

user_timelines:
  - username: "kagedan_k"
    include_retweets: true
    category_default: "ai-workflow"

search_settings:
  max_results_per_query: 5
  exclude_retweets: true
  min_likes: 5
